<!DOCTYPE html>
<html lang="en" class="h-full bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Brick Breaker | Pro Overdrive</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            neonCyan: '#00f3ff',
                            neonMagenta: '#ff00ff',
                            deepBlue: '#0a0a1f',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        tech: ['Orbitron', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @keyframes pulse-glow {
            0%, 100% { filter: drop-shadow(0 0 5px #00f3ff); }
            50% { filter: drop-shadow(0 0 15px #00f3ff); }
        }
        .text-glow-cyan { text-shadow: 0 0 10px #00f3ff; }
        .text-glow-magenta { text-shadow: 0 0 10px #ff00ff; }
        .bg-glass { background: rgba(10, 10, 31, 0.8); backdrop-filter: blur(10px); }
        
        /* Floating score style (CSS2DRenderer) */
        .floating-score {
            font-family: 'Orbitron', sans-serif;
            transition: opacity 1.2s ease-out;
            white-space: nowrap;
        }

        /* SVG Arc Animation */
        .cooldown-circle {
            transition: stroke-dashoffset 0.1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>

    <!-- Import Maps for Three.js Addons -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
</head>
<body class="h-full font-sans text-white overflow-hidden flex flex-col">

    <!-- Performance Header -->
    <header class="h-14 bg-black/60 border-b border-white/10 flex items-center justify-between px-6 z-10">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-brand-neonCyan rounded-sm rotate-45 flex items-center justify-center">
                <div class="w-4 h-4 bg-black rotate-[-45deg]"></div>
            </div>
            <h1 class="font-tech text-xl font-black tracking-tighter uppercase italic">
                Gesture <span class="text-brand-neonCyan">Brick</span> Breaker
            </h1>
        </div>
        <div class="flex gap-8 font-tech text-sm tracking-widest text-gray-400">
            <div>SCORE <span id="score-val" class="text-white ml-2">000,000</span></div>
            <div>LIVES <span id="lives-val" class="text-brand-neonMagenta ml-2">3</span></div>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        
        <!-- Game Viewport -->
        <main class="flex-1 relative bg-black" id="game-viewport">
            <!-- Canvas Injected Here -->

            <!-- Overlays -->
            <div id="overlay-screen" class="absolute inset-0 z-50 flex-col items-center justify-center bg-black/90 pointer-events-none hidden">
                <h2 id="overlay-title" class="font-tech text-8xl font-black text-brand-neonCyan text-glow-cyan mb-2">PAUSED</h2>
                <p id="overlay-msg" class="text-xl text-gray-400 mb-8">Ready your hands to begin</p>
                <button id="start-btn" class="pointer-events-auto px-10 py-4 bg-brand-neonCyan text-black font-tech font-bold uppercase tracking-widest hover:bg-white transition-colors">Start Field</button>
                
                <!-- Name Entry (Hidden by default) -->
                <div id="name-entry-container" class="mt-8 flex-col items-center hidden">
                    <input id="player-name-input" type="text" placeholder="Enter Name..." maxlength="12" class="bg-white/10 border border-white/20 px-4 py-2 text-center font-tech uppercase focus:outline-none focus:border-brand-neonCyan mb-4">
                    <button id="save-score-btn" class="pointer-events-auto text-brand-neonCyan hover:text-white transition-colors">SAVE TO LEADERBOARD</button>
                </div>

                <div id="leaderboard-container" class="mt-12 w-64 hidden flex-col">
                    <h3 class="font-tech text-sm text-center text-gray-400 tracking-widest mb-4 border-b border-white/10 pb-2">HALL OF FAME</h3>
                    <ul id="leaderboard-list" class="space-y-3"></ul>
                    <button id="restart-btn" class="pointer-events-auto mt-8 text-xs text-gray-500 hover:text-white underline underline-offset-4 uppercase">Return to Main</button>
                </div>
            </div>

            <!-- Smash Flash -->
            <div id="smash-flash" class="absolute inset-0 pointer-events-none opacity-0 transition-opacity duration-300 z-40 bg-white"></div>
        </main>

        <!-- Right Sidebar HUD -->
        <aside class="w-64 bg-deepBlue/40 border-l border-white/10 p-4 flex flex-col gap-6 relative z-10">
            <!-- PIP PIP -->
            <div class="relative w-full aspect-video bg-black/80 border border-white/10 rounded overflow-hidden">
                <video id="webcam-video" class="absolute inset-0 w-full h-full object-cover opacity-50 grayscale" playsinline muted></video>
                <canvas id="webcam-canvas" class="relative z-10 w-full h-full"></canvas>
                <div class="absolute bottom-0 left-0 w-full h-1 bg-white/10 overflow-hidden">
                    <div id="confidence-bar-fill" class="h-full bg-brand-neonCyan w-0 transition-all duration-200"></div>
                </div>
            </div>

            <!-- Gesture Indicators -->
            <div class="flex flex-col gap-2 font-tech text-[10px] tracking-widest uppercase">
                <div class="text-gray-500 mb-1">Detection Logic</div>
                <div id="gesture-open" class="flex items-center justify-between bg-white/5 p-2 rounded opacity-30">OPEN HAND ✋ <span class="text-brand-neonCyan">IDLE</span></div>
                <div id="gesture-fist" class="flex items-center justify-between bg-white/5 p-2 rounded opacity-30">FIST ✊ <span class="text-brand-neonMagenta">x2 MULTI</span></div>
                <div id="gesture-pinch" class="flex items-center justify-between bg-white/5 p-2 rounded opacity-30">PINCH 🤏 <span class="text-yellow-400">LASER</span></div>
                <div id="gesture-punch" class="flex items-center justify-between bg-white/5 p-2 rounded opacity-30">PUNCH 👊 <span class="text-red-500">SMASH</span></div>
                <div id="gesture-peace" class="flex items-center justify-between bg-white/5 p-2 rounded opacity-30">PEACE ✌️ <span class="text-blue-400">FREEZE</span></div>
            </div>

            <!-- Ability HUD -->
            <div class="mt-auto grid grid-cols-2 gap-4 h-32 text-center text-[10px] font-tech tracking-wider uppercase">
                <!-- Laser Cooldown -->
                <div class="flex flex-col items-center justify-center gap-2">
                    <svg class="w-12 h-12" viewBox="0 0 36 36">
                        <circle cx="18" cy="18" r="16" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"></circle>
                        <circle id="laser-arc" cx="18" cy="18" r="16" fill="none" stroke="#00f3ff" stroke-width="2" 
                                class="cooldown-circle" stroke-dasharray="100" stroke-dashoffset="0" pathLength="100"></circle>
                    </svg>
                    <span>Laser</span>
                </div>
                <!-- Smash Cooldown -->
                <div class="flex flex-col items-center justify-center gap-2">
                    <svg class="w-12 h-12" viewBox="0 0 36 36">
                        <circle cx="18" cy="18" r="16" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2"></circle>
                        <circle id="smash-arc" cx="18" cy="18" r="16" fill="none" stroke="#ff00ff" stroke-width="2" 
                                class="cooldown-circle" stroke-dasharray="100" stroke-dashoffset="0" pathLength="100"></circle>
                    </svg>
                    <span>Smash</span>
                </div>
                <!-- Level HUD -->
                <div class="col-span-2 border-t border-white/10 pt-4 flex items-center justify-between">
                    <div class="flex flex-col items-start gap-1">
                        <span class="text-gray-500">Level</span>
                        <span id="level-val" class="text-xl font-black text-white">01</span>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        <span class="text-gray-500">Combo</span>
                        <span id="combo-val" class="text-xl font-black text-brand-neonCyan italic">x1</span>
                    </div>
                </div>
            </div>

            <div id="freeze-icon" class="absolute bottom-4 right-4 text-blue-400 grayscale opacity-30">✌️</div>
        </aside>
    </div>

    <!-- Scripts -->
    <script type="module" src="./game.js"></script>
</body>
</html>
